<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HWP Thal — Communication Exercise Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── PASTE YOUR GOOGLE SHEET PUBLISHED CSV URL BELOW ─────────────────────
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/16pnR52eW28hYCklAinKgzokRBHzoVk0Q1-HskeqxMeg/edit?gid=0#gid=0";
    // ─────────────────────────────────────────────────────────────────────────

    const DRILL_INTERVAL_DAYS = 14;

    function parseCSV(text) {
      const lines = text.trim().split("\n");
      if (lines.length < 2) return [];
      const headers = lines[0].split(",").map((h) => h.trim().replace(/"/g, ""));
      return lines.slice(1).map((line) => {
        const cols = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
        const row = {};
        headers.forEach((h, i) => {
          row[h] = (cols[i] || "").replace(/"/g, "").trim();
        });
        return row;
      });
    }

    function daysSince(dateStr) {
      if (!dateStr) return null;
      const parts = dateStr.split(/[-\/]/);
      let d;
      if (parts.length === 3) {
        if (parts[0].length === 4) {
          d = new Date(`${parts[0]}-${parts[1]}-${parts[2]}`);
        } else {
          d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
        }
      } else {
        d = new Date(dateStr);
      }
      if (isNaN(d)) return null;
      return Math.floor((Date.now() - d.getTime()) / (1000 * 60 * 60 * 24));
    }

    function formatDate(dateStr) {
      if (!dateStr) return "—";
      const parts = dateStr.split(/[-\/]/);
      if (parts.length === 3) {
        let d;
        if (parts[0].length === 4) {
          d = new Date(`${parts[0]}-${parts[1]}-${parts[2]}`);
        } else {
          d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
        }
        if (!isNaN(d)) {
          return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
        }
      }
      return dateStr;
    }

    function nextDueDate(dateStr) {
      if (!dateStr) return null;
      const parts = dateStr.split(/[-\/]/);
      let d;
      if (parts[0].length === 4) {
        d = new Date(`${parts[0]}-${parts[1]}-${parts[2]}`);
      } else {
        d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
      }
      if (isNaN(d)) return null;
      d.setDate(d.getDate() + DRILL_INTERVAL_DAYS);
      return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
    }

    function StatusBadge({ days }) {
      if (days === null) return null;
      const daysLeft = DRILL_INTERVAL_DAYS - days;
      if (days > DRILL_INTERVAL_DAYS + 2) {
        return (
          <span style={{
            background: "#fee2e2", color: "#991b1b", padding: "4px 12px",
            borderRadius: "20px", fontSize: "13px", fontWeight: 600
          }}>
            ⚠ OVERDUE by {Math.abs(daysLeft)} days
          </span>
        );
      }
      if (daysLeft <= 3 && daysLeft >= 0) {
        return (
          <span style={{
            background: "#fef3c7", color: "#92400e", padding: "4px 12px",
            borderRadius: "20px", fontSize: "13px", fontWeight: 600
          }}>
            ⏳ Due in {daysLeft} day{daysLeft !== 1 ? "s" : ""}
          </span>
        );
      }
      return (
        <span style={{
          background: "#dcfce7", color: "#166534", padding: "4px 12px",
          borderRadius: "20px", fontSize: "13px", fontWeight: 600
        }}>
          ✓ On Track
        </span>
      );
    }

    function LineStatus({ ok, failed }) {
      const okList = ok ? ok.split(",").map(s => s.trim()).filter(Boolean) : [];
      const failedList = failed ? failed.split(",").map(s => s.trim()).filter(Boolean) : [];
      return (
        <div style={{ display: "flex", flexWrap: "wrap", gap: "5px" }}>
          {okList.map((l, i) => (
            <span key={i} style={{
              background: "#dcfce7", color: "#15803d", padding: "2px 8px",
              borderRadius: "4px", fontSize: "12px", fontWeight: 500
            }}>✓ {l}</span>
          ))}
          {failedList.map((l, i) => (
            <span key={i} style={{
              background: "#fee2e2", color: "#b91c1c", padding: "2px 8px",
              borderRadius: "4px", fontSize: "12px", fontWeight: 500
            }}>✗ {l}</span>
          ))}
        </div>
      );
    }

    function StatCard({ label, value, sub, accent }) {
      return (
        <div style={{
          background: "#fff", border: "1px solid #e5e7eb", borderRadius: "12px",
          padding: "20px 24px", flex: "1", minWidth: "160px",
          borderTop: `4px solid ${accent || "#1e3a5f"}`
        }}>
          <div style={{ fontSize: "12px", color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.8px", marginBottom: "6px" }}>
            {label}
          </div>
          <div style={{ fontSize: "26px", fontWeight: 700, color: "#111827", lineHeight: 1.1 }}>{value}</div>
          {sub && <div style={{ fontSize: "12px", color: "#9ca3af", marginTop: "4px" }}>{sub}</div>}
        </div>
      );
    }

    function Dashboard() {
      const [records, setRecords] = useState([]);
      const [loading, setLoading] = useState(true);
      const [usingMock, setUsingMock] = useState(false);
      const [expandedRow, setExpandedRow] = useState(null);
      const [lastRefresh, setLastRefresh] = useState(new Date());

      const MOCK_DATA = [
        {
          Date: "10-06-2026", Time: "10:30",
          "Officials Present": "Shri A.K. Sharma, Shri R. Patil",
          "Departments Checked": "Fire Station, Security, Medical, Admin Block",
          "Lines OK": "Fire Station, Security, Medical",
          "Lines Failed": "Admin Block",
          Remarks: "Admin Block line restored after 5 min.",
          "Photo URL": "", "Uploaded On": "10-06-2026",
        },
        {
          Date: "27-05-2026", Time: "11:00",
          "Officials Present": "Shri R. Patil, Smt. S. Joshi",
          "Departments Checked": "Fire Station, Security, Medical, Admin Block",
          "Lines OK": "Fire Station, Security, Medical, Admin Block",
          "Lines Failed": "",
          Remarks: "All lines functional.",
          "Photo URL": "", "Uploaded On": "27-05-2026",
        },
      ];

      const fetchData = async () => {
        setLoading(true);
        if (SHEET_CSV_URL === "YOUR_GOOGLE_SHEET_PUBLISHED_CSV_URL_HERE") {
          setRecords(MOCK_DATA);
          setUsingMock(true);
          setLoading(false);
          return;
        }
        try {
          const res = await fetch(`${SHEET_CSV_URL}&t=${Date.now()}`);
          if (!res.ok) throw new Error("Fetch failed");
          const text = await res.text();
          const parsed = parseCSV(text);
          parsed.sort((a, b) => (daysSince(a.Date) ?? 9999) - (daysSince(b.Date) ?? 9999));
          setRecords(parsed);
          setUsingMock(false);
          setLastRefresh(new Date());
        } catch {
          setRecords(MOCK_DATA);
          setUsingMock(true);
        }
        setLoading(false);
      };

      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, 5 * 60 * 1000);
        return () => clearInterval(interval);
      }, []);

      const latest = records[0];
      const daysSinceLast = latest ? daysSince(latest.Date) : null;
      const totalDrills = records.length;
      const totalIssues = records.filter(r => r["Lines Failed"] && r["Lines Failed"].trim()).length;

      return (
        <div style={{ fontFamily: "'Inter', system-ui, sans-serif", background: "#f8fafc", minHeight: "100vh" }}>
          {/* Header */}
          <div style={{
            background: "linear-gradient(135deg, #1e3a5f 0%, #0f2942 100%)",
            padding: "28px 32px 24px", color: "#fff"
          }}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: "12px" }}>
              <div>
                <div style={{ fontSize: "11px", letterSpacing: "2px", textTransform: "uppercase", color: "#93c5fd", marginBottom: "6px" }}>
                  Heavy Water Plant, Thal · Department of Atomic Energy
                </div>
                <h1 style={{ margin: 0, fontSize: "22px", fontWeight: 700, color: "#fff", lineHeight: 1.2 }}>
                  Communication Exercise<br />Compliance Dashboard
                </h1>
                <div style={{ fontSize: "12px", color: "#94a3b8", marginTop: "8px" }}>
                  Fortnightly drill tracking · Auto-refreshes every 5 minutes
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                {latest && <StatusBadge days={daysSinceLast} />}
                <div style={{ fontSize: "11px", color: "#64748b", marginTop: "8px" }}>
                  Last updated: {lastRefresh.toLocaleTimeString("en-IN")}
                </div>
                <button onClick={fetchData} style={{
                  marginTop: "8px", background: "rgba(255,255,255,0.1)",
                  border: "1px solid rgba(255,255,255,0.2)", color: "#fff",
                  padding: "5px 12px", borderRadius: "6px", fontSize: "12px", cursor: "pointer"
                }}>
                  ↻ Refresh
                </button>
              </div>
            </div>
          </div>

          <div style={{ padding: "24px 32px", maxWidth: "1200px", margin: "0 auto" }}>
            {usingMock && (
              <div style={{
                background: "#fef9c3", border: "1px solid #fde047", borderRadius: "8px",
                padding: "10px 16px", marginBottom: "20px", fontSize: "13px", color: "#713f12"
              }}>
                <strong>Demo Mode:</strong> Replace <code>SHEET_CSV_URL</code> in the code with your published Google Sheet CSV link to go live.
              </div>
            )}

            {/* Stat Cards */}
            <div style={{ display: "flex", gap: "16px", flexWrap: "wrap", marginBottom: "24px" }}>
              <StatCard label="Last Drill" value={latest ? formatDate(latest.Date) : "—"}
                sub={daysSinceLast !== null ? `${daysSinceLast} days ago` : "No records"} accent="#1e3a5f" />
              <StatCard label="Next Due By" value={latest ? nextDueDate(latest.Date) : "—"}
                sub={`Every ${DRILL_INTERVAL_DAYS} days`} accent="#0ea5e9" />
              <StatCard label="Total Drills" value={totalDrills}
                sub="All time records" accent="#7c3aed" />
              <StatCard label="Issues Found" value={totalIssues}
                sub={`${totalDrills - totalIssues} fully clear drills`}
                accent={totalIssues > 0 ? "#dc2626" : "#16a34a"} />
            </div>

            {/* Latest Drill Summary */}
            {latest && (
              <div style={{
                background: "#fff", border: "1px solid #e5e7eb", borderRadius: "12px",
                padding: "20px 24px", marginBottom: "24px"
              }}>
                <div style={{ fontSize: "11px", color: "#6b7280", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "14px" }}>
                  Latest Drill — {formatDate(latest.Date)} at {latest.Time || "—"}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: "16px" }}>
                  <div>
                    <div style={{ fontSize: "11px", color: "#9ca3af", marginBottom: "4px" }}>Officials Present</div>
                    <div style={{ fontSize: "14px", color: "#111827" }}>{latest["Officials Present"] || "—"}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: "11px", color: "#9ca3af", marginBottom: "4px" }}>Departments Checked</div>
                    <div style={{ fontSize: "14px", color: "#111827" }}>{latest["Departments Checked"] || "—"}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: "11px", color: "#9ca3af", marginBottom: "6px" }}>Line Status</div>
                    <LineStatus ok={latest["Lines OK"]} failed={latest["Lines Failed"]} />
                  </div>
                  {latest.Remarks && (
                    <div>
                      <div style={{ fontSize: "11px", color: "#9ca3af", marginBottom: "4px" }}>Remarks</div>
                      <div style={{ fontSize: "14px", color: "#374151", fontStyle: "italic" }}>{latest.Remarks}</div>
                    </div>
                  )}
                </div>
                {latest["Photo URL"] && (
                  <a href={latest["Photo URL"]} target="_blank" rel="noreferrer"
                    style={{ display: "inline-block", marginTop: "14px", fontSize: "13px", color: "#2563eb", textDecoration: "none" }}>
                    📷 View Original Record →
                  </a>
                )}
              </div>
            )}

            {/* History Table */}
            <div style={{ background: "#fff", border: "1px solid #e5e7eb", borderRadius: "12px", overflow: "hidden" }}>
              <div style={{
                padding: "16px 24px", borderBottom: "1px solid #f1f5f9",
                display: "flex", justifyContent: "space-between", alignItems: "center"
              }}>
                <div style={{ fontWeight: 600, color: "#111827", fontSize: "15px" }}>Drill History</div>
                <div style={{ fontSize: "12px", color: "#9ca3af" }}>{totalDrills} records · Click any row for details</div>
              </div>

              {loading ? (
                <div style={{ padding: "40px", textAlign: "center", color: "#9ca3af" }}>Loading records…</div>
              ) : records.length === 0 ? (
                <div style={{ padding: "40px", textAlign: "center", color: "#9ca3af" }}>
                  No records found. Upload your first drill photo to get started.
                </div>
              ) : (
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead>
                      <tr style={{ background: "#f8fafc" }}>
                        {["Date", "Time", "Officials Present", "Lines OK", "Lines Failed", "Remarks", "Record"].map(h => (
                          <th key={h} style={{
                            padding: "10px 16px", textAlign: "left", fontSize: "11px",
                            color: "#6b7280", fontWeight: 600, textTransform: "uppercase",
                            letterSpacing: "0.6px", borderBottom: "1px solid #e5e7eb", whiteSpace: "nowrap"
                          }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {records.map((r, i) => {
                        const hasIssue = r["Lines Failed"] && r["Lines Failed"].trim();
                        const isExpanded = expandedRow === i;
                        return (
                          <React.Fragment key={i}>
                            <tr
                              onClick={() => setExpandedRow(isExpanded ? null : i)}
                              style={{
                                cursor: "pointer",
                                background: isExpanded ? "#f0f9ff" : hasIssue ? "#fffbeb" : "#fff",
                                borderBottom: "1px solid #f1f5f9"
                              }}
                            >
                              <td style={{ padding: "12px 16px", fontSize: "13px", fontWeight: 600, color: "#1e3a5f", whiteSpace: "nowrap" }}>
                                {formatDate(r.Date)}
                              </td>
                              <td style={{ padding: "12px 16px", fontSize: "13px", color: "#374151" }}>{r.Time || "—"}</td>
                              <td style={{ padding: "12px 16px", fontSize: "13px", color: "#374151", maxWidth: "180px" }}>
                                <div style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                  {r["Officials Present"] || "—"}
                                </div>
                              </td>
                              <td style={{ padding: "12px 16px" }}>
                                {r["Lines OK"] ? (
                                  <span style={{ fontSize: "12px", color: "#15803d" }}>
                                    ✓ {r["Lines OK"].split(",").length} line{r["Lines OK"].split(",").length !== 1 ? "s" : ""}
                                  </span>
                                ) : "—"}
                              </td>
                              <td style={{ padding: "12px 16px" }}>
                                {hasIssue ? (
                                  <span style={{ fontSize: "12px", color: "#b91c1c", fontWeight: 600 }}>
                                    ✗ {r["Lines Failed"].split(",").length} failed
                                  </span>
                                ) : (
                                  <span style={{ fontSize: "12px", color: "#15803d" }}>All clear</span>
                                )}
                              </td>
                              <td style={{ padding: "12px 16px", fontSize: "12px", color: "#6b7280", maxWidth: "200px" }}>
                                <div style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                  {r.Remarks || "—"}
                                </div>
                              </td>
                              <td style={{ padding: "12px 16px" }}>
                                {r["Photo URL"] ? (
                                  <a href={r["Photo URL"]} target="_blank" rel="noreferrer"
                                    onClick={e => e.stopPropagation()}
                                    style={{ fontSize: "12px", color: "#2563eb", textDecoration: "none" }}>
                                    📷 View
                                  </a>
                                ) : (
                                  <span style={{ fontSize: "12px", color: "#d1d5db" }}>—</span>
                                )}
                              </td>
                            </tr>
                            {isExpanded && (
                              <tr>
                                <td colSpan={7} style={{ padding: "16px 24px", background: "#f0f9ff", borderBottom: "1px solid #e0f2fe" }}>
                                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: "16px" }}>
                                    <div>
                                      <div style={{ fontSize: "11px", color: "#0369a1", textTransform: "uppercase", letterSpacing: "0.6px", marginBottom: "4px" }}>Departments Checked</div>
                                      <div style={{ fontSize: "13px", color: "#1e3a5f" }}>{r["Departments Checked"] || "—"}</div>
                                    </div>
                                    <div>
                                      <div style={{ fontSize: "11px", color: "#0369a1", textTransform: "uppercase", letterSpacing: "0.6px", marginBottom: "6px" }}>Line-by-Line Status</div>
                                      <LineStatus ok={r["Lines OK"]} failed={r["Lines Failed"]} />
                                    </div>
                                    <div>
                                      <div style={{ fontSize: "11px", color: "#0369a1", textTransform: "uppercase", letterSpacing: "0.6px", marginBottom: "4px" }}>Full Remarks</div>
                                      <div style={{ fontSize: "13px", color: "#374151" }}>{r.Remarks || "No remarks"}</div>
                                    </div>
                                  </div>
                                </td>
                              </tr>
                            )}
                          </React.Fragment>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>

            <div style={{ fontSize: "11px", color: "#9ca3af", textAlign: "center", marginTop: "20px", paddingBottom: "24px" }}>
              HWP Thal · Emergency Communication Exercise Tracker · Data source: Google Sheets
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
