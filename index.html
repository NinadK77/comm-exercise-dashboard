    function parseCSV(text) {
      const lines = text.trim().split("\n");
      if (lines.length < 2) return [];
      const headers = lines[0].split(",").map(h => h.trim().replace(/"/g, ""));
      return lines.slice(1).map(line => {
        const cols = [];
        let current = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          if (line[i] === '"') { inQuotes = !inQuotes; }
          else if (line[i] === "," && !inQuotes) { cols.push(current.trim()); current = ""; }
          else { current += line[i]; }
        }
        cols.push(current.trim());
        const row = {};
        headers.forEach((h, i) => { row[h] = (cols[i] || "").trim(); });
        return row;
      });
    }

    function parseDate(dateStr) {
      if (!dateStr) return null;
      const parts = dateStr.split(/[-\/]/);
      if (parts.length !== 3) return null;
      const d = parts[0].length === 4
        ? new Date(`${parts[0]}-${parts[1]}-${parts[2]}`)
        : new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
      return isNaN(d) ? null : d;
    }

    function daysSince(dateStr) {
      const d = parseDate(dateStr);
      if (!d) return null;
      return Math.floor((Date.now() - d.getTime()) / 86400000);
    }

    function formatDate(dateStr) {
      const d = parseDate(dateStr);
      if (!d) return dateStr || "—";
      return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
    }

    function nextDueInfo(dateStr) {
      const d = parseDate(dateStr);
      if (!d) return { label: "—", overdue: false, daysLeft: null };
      const day = d.getDate(), month = d.getMonth(), year = d.getFullYear();
      const dueDate = day <= 15
        ? new Date(year, month + 1, 0)   // last day of same month
        : new Date(year, month + 1, 15); // 15th of next month
      const today = new Date(); today.setHours(0,0,0,0);
      const daysLeft = Math.floor((dueDate - today) / 86400000);
      return {
        label: dueDate.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" }),
        daysLeft,
        overdue: daysLeft < 0
      };
    }

    function StatusBadge({ dateStr }) {
      const { daysLeft, overdue } = nextDueInfo(dateStr);
      if (daysLeft === null) return null;
      if (overdue) return (
        <span style={{ background:"#fee2e2", color:"#991b1b", padding:"4px 14px", borderRadius:"20px", fontSize:"13px", fontWeight:700 }}>
          ⚠ OVERDUE by {Math.abs(daysLeft)} day{Math.abs(daysLeft)!==1?"s":""}
        </span>
      );
      if (daysLeft <= 3) return (
        <span style={{ background:"#fef3c7", color:"#92400e", padding:"4px 14px", borderRadius:"20px", fontSize:"13px", fontWeight:700 }}>
          ⏳ Due in {daysLeft} day{daysLeft!==1?"s":""}
        </span>
      );
      return (
        <span style={{ background:"#dcfce7", color:"#166534", padding:"4px 14px", borderRadius:"20px", fontSize:"13px", fontWeight:700 }}>
          ✓ On Track
        </span>
      );
    }

                  </div>
                  <div style={{ fontSize:"19px", fontWeight:700, color:"#fff", lineHeight:1.2 }}>
                    Communication Exercise Compliance Dashboard
                  </div>
                  <div style={{ fontSize:"11px", color:"#94a3b8", marginTop:"3px" }}>
                    Department of Atomic Energy, Government of India
                  </div>
                </div>
              </div>
              <div style={{ textAlign:"right" }}>
                {latest && <StatusBadge dateStr={latest.Date} />}
                <div style={{ fontSize:"11px", color:"#475569", marginTop:"8px" }}>
                  Updated: {lastRefresh.toLocaleTimeString("en-IN")}
                </div>
                <button onClick={fetchData} style={{ marginTop:"6px", background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.25)", color:"#e2e8f0", padding:"5px 14px", borderRadius:"6px", fontSize:"12px", cursor:"pointer" }}>
                  ↻ Refresh
                </button>
              </div>
            </div>

            {/* Plant image hero strip */}
            <div style={{ position:"relative", height:"180px", overflow:"hidden" }}>
              <img src={PLANT_IMG} alt="Heavy Water Plant, Thal"
                style={{ width:"100%", height:"100%", objectFit:"cover", objectPosition:"center 40%", display:"block" }} />
              <div style={{ position:"absolute", inset:0, background:"linear-gradient(to bottom, rgba(15,41,66,0.35) 0%, rgba(15,41,66,0.7) 100%)" }} />
              <div style={{ position:"absolute", bottom:"14px", left:"32px", color:"rgba(255,255,255,0.7)", fontSize:"11px", letterSpacing:"1px" }}>
                HEAVY WATER PLANT, THAL · ESTABLISHED 1987
              </div>
            </div>
          </div>

          <div style={{ padding:"24px 32px", maxWidth:"1200px", margin:"0 auto" }}>

            {usingMock && (
              <div style={{ background:"#fef9c3", border:"1px solid #fde047", borderRadius:"8px", padding:"10px 16px", marginBottom:"20px", fontSize:"13px", color:"#713f12" }}>
                <strong>Demo Mode:</strong> Replace <code>SHEET_CSV_URL</code> in the code with your published Google Sheet CSV link to go live.
              </div>
            )}

            {/* ── STAT CARDS ── */}
            <div style={{ display:"flex", gap:"16px", flexWrap:"wrap", marginBottom:"24px" }}>
              <StatCard
                label="Last Communication Exercise"
                value={latest ? formatDate(latest.Date) : "—"}
                sub={daysAgo !== null ? `Conducted ${daysAgo} days ago` : "No records yet"}
                accent="#1e3a5f"
              />
              <StatCard
                label="Next Exercise Due By"
                value={due ? due.label : "—"}
                sub="First half or second half of month"
                accent={due?.overdue ? "#dc2626" : due?.daysLeft <= 3 ? "#d97706" : "#0ea5e9"}
              />
              <StatCard
                label={`Exercises in ${currentYear}`}
                value={thisYearCount}
                sub={`${totalExercises} total all time`}
                accent="#7c3aed"
              />
            </div>

            {/* ── LATEST EXERCISE SUMMARY ── */}
            {latest && (
              <div className="fade-in" style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:"12px", padding:"20px 28px", marginBottom:"24px" }}>
                <div style={{ fontSize:"11px", color:"#64748b", textTransform:"uppercase", letterSpacing:"1.2px", marginBottom:"14px", fontWeight:600 }}>
                  Latest Communication Exercise — {formatDate(latest.Date)} at {latest.Time || "—"}
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))", gap:"20px" }}>
                  <div>
                    <div style={{ fontSize:"11px", color:"#94a3b8", marginBottom:"5px", textTransform:"uppercase", letterSpacing:"0.8px" }}>Departments Contacted</div>
                    <div style={{ fontSize:"14px", color:"#1e293b", lineHeight:1.6 }}>{latest["Departments Checked"] || "—"}</div>
                  </div>
                  <div style={{ gridColumn:"span 2" }}>
                    <div style={{ fontSize:"11px", color:"#94a3b8", marginBottom:"5px", textTransform:"uppercase", letterSpacing:"0.8px" }}>Remarks</div>
                    <div style={{ fontSize:"14px", color:"#374151", fontStyle:"italic", lineHeight:1.7, background:"#f8fafc", padding:"12px 16px", borderRadius:"8px", borderLeft:"3px solid #1e3a5f" }}>
                      {latest.Remarks || "No remarks recorded"}
                    </div>
                  </div>
                </div>
                {latest["Photo URL"] && (
                  <a href={latest["Photo URL"]} target="_blank" rel="noreferrer"
                    style={{ display:"inline-block", marginTop:"14px", fontSize:"13px", color:"#2563eb", textDecoration:"none", fontWeight:500 }}>
                    📷 View Original Logbook Entry →
                  </a>
                )}
              </div>
            )}

            {/* ── HISTORY TABLE ── */}
            <div style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:"12px", overflow:"hidden" }}>
              <div style={{ padding:"16px 28px", borderBottom:"1px solid #f1f5f9", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ fontWeight:700, color:"#0f172a", fontSize:"15px" }}>Communication Exercise History</div>
                <div style={{ fontSize:"12px", color:"#94a3b8" }}>{totalExercises} record{totalExercises!==1?"s":""} · Click any row for full remarks</div>
              </div>

              {loading ? (
                <div style={{ padding:"48px", textAlign:"center", color:"#94a3b8" }}>Loading records…</div>
              ) : records.length === 0 ? (
                <div style={{ padding:"48px", textAlign:"center", color:"#94a3b8" }}>
                  No records found. Upload your first exercise photo to Drive to get started.
                </div>
              ) : (
                <div style={{ overflowX:"auto" }}>
                  <table style={{ width:"100%", borderCollapse:"collapse" }}>
                    <thead>
                      <tr style={{ background:"#f8fafc" }}>
                        {["Date","Time","Departments Contacted","Remarks","Record"].map(h => (
                          <th key={h} style={{ padding:"10px 16px", textAlign:"left", fontSize:"11px", color:"#64748b", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.8px", borderBottom:"1px solid #e2e8f0", whiteSpace:"nowrap" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {records.map((r, i) => {
                        const isExpanded = expandedRow === i;
                        return (
                          <React.Fragment key={i}>
                            <tr
                              onClick={() => setExpandedRow(isExpanded ? null : i)}
                              style={{ cursor:"pointer", background:isExpanded?"#f0f9ff":"#fff", borderBottom:"1px solid #f1f5f9", transition:"background 0.15s" }}
                            >
                              <td style={{ padding:"13px 16px", fontSize:"13px", fontWeight:700, color:"#1e3a5f", whiteSpace:"nowrap" }}>
                                {formatDate(r.Date)}
                              </td>
                              <td style={{ padding:"13px 16px", fontSize:"13px", color:"#475569", whiteSpace:"nowrap" }}>{r.Time||"—"}</td>
                              <td style={{ padding:"13px 16px", fontSize:"13px", color:"#374151", maxWidth:"220px" }}>
                                <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r["Departments Checked"]||"—"}</div>
                              </td>
                              <td style={{ padding:"13px 16px", fontSize:"12px", color:"#64748b", maxWidth:"300px" }}>
                                <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.Remarks||"—"}</div>
                              </td>
                              <td style={{ padding:"13px 16px" }}>
                                {r["Photo URL"] ? (
                                  <a href={r["Photo URL"]} target="_blank" rel="noreferrer"
                                    onClick={e=>e.stopPropagation()}
                                    style={{ fontSize:"12px", color:"#2563eb", textDecoration:"none", fontWeight:500 }}>
                                    📷 View
                                  </a>
                                ) : <span style={{ fontSize:"12px", color:"#e2e8f0" }}>—</span>}
                              </td>
                            </tr>
                            {isExpanded && (
                              <tr>
                                <td colSpan={5} style={{ padding:"18px 28px", background:"#f0f9ff", borderBottom:"1px solid #bae6fd" }}>
                                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:"20px" }}>
                                    <div>
                                      <div style={{ fontSize:"11px", color:"#0369a1", textTransform:"uppercase", letterSpacing:"0.8px", marginBottom:"6px", fontWeight:600 }}>Departments Contacted</div>
                                      <div style={{ fontSize:"13px", color:"#1e3a5f", lineHeight:1.6 }}>{r["Departments Checked"]||"—"}</div>
                                    </div>
                                    <div style={{ gridColumn:"span 2" }}>
                                      <div style={{ fontSize:"11px", color:"#0369a1", textTransform:"uppercase", letterSpacing:"0.8px", marginBottom:"6px", fontWeight:600 }}>Full Remarks</div>
                                      <div style={{ fontSize:"13px", color:"#1e293b", lineHeight:1.7, background:"#fff", padding:"12px 16px", borderRadius:"8px", borderLeft:"3px solid #0ea5e9" }}>
                                        {r.Remarks||"No remarks recorded"}
                                      </div>
                                    </div>
                                  </div>
                                </td>
                              </tr>
                            )}
                          </React.Fragment>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>

            <div style={{ fontSize:"11px", color:"#94a3b8", textAlign:"center", marginTop:"24px", paddingBottom:"28px" }}>
              Heavy Water Plant, Thal · Communication Exercise Compliance Tracker · Heavy Water Board, DAE · Data: Google Sheets
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
